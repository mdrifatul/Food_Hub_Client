<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e" />
      <stop offset="100%" style="stop-color:#16213e" />
    </linearGradient>
    <linearGradient id="spoonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700" />
      <stop offset="100%" style="stop-color:#FF6B35" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bgGrad)" />

  <!-- Subtle inner ring -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="#FF6B35" stroke-width="0.5" stroke-opacity="0.3" />

  <!-- Spoon group (centered, slightly tilted 15deg) -->
  <g transform="rotate(-10, 32, 32)" filter="url(#glow)">
    <!-- Spoon bowl -->
    <ellipse cx="32" cy="17" rx="8.5" ry="10" fill="url(#spoonGrad)" />
    <!-- Bowl inner sheen -->
    <ellipse cx="29.5" cy="14.5" rx="3.5" ry="4" fill="white" fill-opacity="0.2" />

    <!-- Neck -->
    <path d="M29.2 26.5 C29.2 29 30.5 32 31.5 36 L32.5 36 C33.5 32 34.8 29 34.8 26.5 Q33 28 32 28 Q31 28 29.2 26.5Z" fill="url(#spoonGrad)" />

    <!-- Handle -->
    <rect x="30.3" y="35.5" width="3.4" height="15" rx="1.7" fill="url(#spoonGrad)" />
  </g>

  <!-- Steam wisps above spoon bowl -->
  <g stroke="#FFD700" stroke-width="1.4" stroke-linecap="round" fill="none" stroke-opacity="0.7">
    <path d="M27 9 Q26 6.5 27 4" />
    <path d="M32 8 Q31 5.5 32 3" />
    <path d="M37 9 Q36 6.5 37 4" />
  </g>
</svg>